name: npm install diagnostic (Windows)

on:
  push:
    branches: [main]

jobs:
  npm-diag:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          architecture: x64
      - name: download tgz
        shell: cmd
        run: curl -fsSL https://registry.npmjs.org/opencode-windows-x64/-/opencode-windows-x64-1.17.18.tgz -o oc.tgz
      - name: F = cmd /c node npm-cli.js (PROPOSED FIX)
        shell: cmd
        run: |
          for /f "delims=" %%P in ('where npm') do set "NPMCMD=%%P"
          set "NPMCLI=%~dpPnpm-cli.js"
          cmd /c ""%NPMCMD%"" >nul 2>&1
          cmd /c ""%NODE_EXE%" "%NPMCLI%" install "%CD%\oc.tgz" --prefix "%CD%\appF" --no-fund --no-audit --no-bin-links --loglevel=error" > f.txt 2>&1
          echo F_exit=%errorlevel%
          findstr /i "EUSAGE" f.txt >nul && (echo F_EUSAGE && exit 1) || echo F_FINE
          powershell -NoProfile -Command "Get-Content f.txt | Select-Object -Last 4"
