name: npm install diagnostic (Windows)

on:
  push:
    branches: [main]

jobs:
  npm-diag:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          architecture: x64
      - name: npm version + reproduce exact install command
        shell: cmd
        run: |
          npm --version
          curl -fsSL https://registry.npmjs.org/opencode-windows-x64/-/opencode-windows-x64-1.17.18.tgz -o oc.tgz
          echo TEST1 start
          npm install "%CD%\oc.tgz" --prefix "%CD%\app" --no-fund --no-audit --no-bin-links --loglevel=error > out1.txt 2>&1
          echo TEST1 exit=%errorlevel%
          findstr /i "EUSAGE" out1.txt >nul && echo TEST1_HAS_EUSAGE || echo TEST1_NO_EUSAGE
          echo TEST2 start
          npm install "%CD%\oc.tgz" --prefix "%CD%\app2" --no-fund --no-audit --no-bin-links --log-level=error > out2.txt 2>&1
          echo TEST2 exit=%errorlevel%
          findstr /i "EUSAGE" out2.txt >nul && echo TEST2_HAS_EUSAGE || echo TEST2_NO_EUSAGE
          echo ---- out1 tail ----
          powershell -NoProfile -Command "Get-Content out1.txt | Select-Object -Last 6"
