name: npm install diagnostic (Windows)

on:
  push:
    branches: [main]

jobs:
  npm-diag:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          architecture: x64
      - name: download tgz
        shell: cmd
        run: curl -fsSL https://registry.npmjs.org/opencode-windows-x64/-/opencode-windows-x64-1.17.18.tgz -o oc.tgz
      - name: E = direct "%NPM_CMD%" install (no call) + echo after
        shell: cmd
        run: |
          for /f "delims=" %%P in ('where npm') do set "NPMCMD=%%P"
          "%NPMCMD%" install "%CD%\oc.tgz" --prefix "%CD%\appE" --no-fund --no-audit --no-bin-links --loglevel=error > e.txt 2>&1
          echo AFTER_INSTALL exit=%errorlevel%
          findstr /i "EUSAGE" e.txt >nul && (echo E_EUSAGE && exit 1) || echo E_FINE
          powershell -NoProfile -Command "Get-Content e.txt | Select-Object -Last 4"
          dir appE\node_modules\opencode-windows-x64\bin\opencode.exe
